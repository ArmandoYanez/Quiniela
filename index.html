<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 Quiniela Mundial 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #001744;
      --navy-mid:  #002d7a;
      --red:       #c8102e;
      --gold:      #ffd700;
      --gold-dk:   #d4af00;
      --white:     #ffffff;
      --bg:        #f0f3f9;
      --border:    #dde3ee;
      --text:      #0d1b3e;
      --text-mid:  #4a5578;
      --text-mute: #8899b8;
      --green:     #2e7d32;
      --green-lt:  #e8f5e9;
      --live-red:  #d32f2f;
      --shadow-sm: 0 2px 8px rgba(0,23,70,.07);
      --shadow:    0 4px 24px rgba(0,23,70,.11);
      --shadow-lg: 0 10px 48px rgba(0,23,70,.18);
      --radius:    18px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────────────── */
    .header {
      background: linear-gradient(145deg, var(--navy) 0%, #001f70 45%, var(--red) 100%);
      padding: 2rem 1rem 2.4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '⚽';
      position: absolute;
      font-size: 240px;
      opacity: .035;
      top: -50px; right: -50px;
      animation: slowspin 30s linear infinite;
      pointer-events: none;
    }
    @keyframes slowspin { to { transform: rotate(360deg); } }

    .header-eyebrow {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-size: .62rem;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 4px 16px;
      border-radius: 30px;
      margin-bottom: 12px;
    }
    .header h1 {
      color: var(--white);
      font-size: clamp(2.2rem, 9vw, 4rem);
      font-weight: 900;
      letter-spacing: -1.5px;
      line-height: .95;
      text-transform: uppercase;
    }
    .header h1 em { color: var(--gold); font-style: normal; display: block; }
    .header-sub {
      color: rgba(255,255,255,.6);
      font-size: clamp(.75rem, 2.5vw, .95rem);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .scoring-row {
      display: flex;
      justify-content: center;
      gap: 8px; flex-wrap: wrap;
      margin-top: 18px;
    }
    .score-tag {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: var(--white);
      padding: 5px 14px;
      border-radius: 30px;
      font-size: .76rem;
      font-weight: 700;
    }

    /* ── NAV ─────────────────────────────────────────── */
    .nav-wrap {
      position: sticky; top: 0; z-index: 200;
      background: var(--white);
      box-shadow: 0 1px 0 var(--border), var(--shadow-sm);
    }
    .nav-inner {
      display: flex; align-items: center;
      max-width: 860px; margin: 0 auto;
    }
    .nav { display: flex; flex: 1; }
    .nav-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 13px 8px;
      border: none; background: none; cursor: pointer;
      font-size: .86rem; font-weight: 700; color: var(--text-mute);
      border-bottom: 3px solid transparent;
      transition: color .18s, border-color .18s, background .18s;
      white-space: nowrap;
    }
    .nav-btn:hover { color: var(--navy); background: rgba(0,23,70,.03); }
    .nav-btn.active { color: var(--navy); border-bottom-color: var(--gold); }

    /* sync pill in nav */
    .sync-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: .7rem; font-weight: 700;
      background: var(--bg);
      color: var(--text-mute);
      margin-right: 10px;
      white-space: nowrap;
      transition: background .2s, color .2s;
      flex-shrink: 0;
    }
    .sync-pill.ok    { background: var(--green-lt); color: var(--green); }
    .sync-pill.err   { background: #ffebee; color: var(--live-red); }
    .sync-pill.spin  { background: #e3f2fd; color: #1565c0; }
    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .sync-dot.pulse { animation: pulse-dot 1.2s ease-in-out infinite; }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.65); }
    }
    @keyframes spin-icon { to { transform: rotate(360deg); } }
    .spinning { display: inline-block; animation: spin-icon .7s linear infinite; }

    @media (max-width: 440px) {
      .nav-label  { display: none; }
      .sync-label { display: none; }
      .sync-pill  { padding: 5px 8px; }
    }

    /* ── LAYOUT ──────────────────────────────────────── */
    .container { max-width: 860px; margin: 0 auto; padding: 1.4rem 1rem 3rem; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── CARD ────────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.3rem 1.3rem 1.5rem;
      margin-bottom: 1.3rem;
    }
    .card-title {
      font-size: .95rem; font-weight: 800; color: var(--navy);
      margin-bottom: 1.1rem;
      display: flex; align-items: center; gap: 8px;
      text-transform: uppercase; letter-spacing: .5px;
    }

    /* ── LIVE CARD ───────────────────────────────────── */
    .live-card {
      border: 2px solid var(--live-red);
      background: linear-gradient(135deg, #fff5f5 0%, #fff 60%);
    }
    .live-title {
      display: flex; align-items: center; gap: 8px;
      font-size: .95rem; font-weight: 800;
      color: var(--live-red);
      margin-bottom: 1rem;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .live-dot-big {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--live-red);
      animation: pulse-dot 1s ease-in-out infinite;
      flex-shrink: 0;
    }

    .live-match {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #fde8e8;
    }
    .live-match:last-child { border-bottom: none; padding-bottom: 0; }
    .live-team { display: flex; flex-direction: column; gap: 3px; }
    .live-team.right { align-items: flex-end; text-align: right; }
    .live-flag { font-size: 1.6rem; line-height: 1; }
    .live-team-name { font-weight: 800; font-size: .95rem; }
    .live-owner {
      font-size: .72rem; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
      display: inline-block;
    }
    .live-score-block { text-align: center; }
    .live-score {
      background: var(--live-red);
      color: var(--white);
      font-weight: 900; font-size: 1.7rem;
      letter-spacing: 4px;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      display: inline-block;
      animation: live-pulse 2s ease-in-out infinite;
      box-shadow: 0 4px 16px rgba(211,47,47,.35);
    }
    @keyframes live-pulse {
      0%,100% { box-shadow: 0 4px 16px rgba(211,47,47,.35); }
      50%      { box-shadow: 0 4px 28px rgba(211,47,47,.7); }
    }
    .live-clock {
      font-size: .75rem; font-weight: 800; color: var(--live-red);
      margin-top: 6px; letter-spacing: 1px;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }

    /* upcoming matches in live card */
    .upcoming-match {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      opacity: .75;
    }
    .upcoming-match:last-child { border-bottom: none; padding-bottom: 0; }
    .upcoming-score {
      background: var(--bg);
      color: var(--text-mid);
      font-weight: 700; font-size: .85rem;
      padding: 5px 10px;
      border-radius: var(--radius-xs);
      text-align: center;
    }
    .upcoming-time { font-size: .62rem; color: var(--text-mute); margin-top: 3px; text-align: center; }

    /* ── STANDINGS ───────────────────────────────────── */
    .standings-list { display: flex; flex-direction: column; gap: 6px; }
    .standing-row {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      transition: transform .14s, box-shadow .14s;
    }
    .standing-row:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .standing-row.rank-1 { background: linear-gradient(120deg, #fff8cc, #ffe566); }
    .standing-row.rank-2 { background: linear-gradient(120deg, #f3f3f3, #dcdcdc); }
    .standing-row.rank-3 { background: linear-gradient(120deg, #fde8d5, #e8b87d); }
    .rank-badge { width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0; }
    .rank-num   { width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.95rem;color:var(--text-mid);background:var(--white);box-shadow:var(--shadow-sm); }
    .player-name { font-weight:800; font-size:1.05rem; }
    .pts-pills   { display:flex;gap:5px;margin-top:5px;flex-wrap:wrap; }
    .pill        { padding:2px 9px;border-radius:20px;font-size:.67rem;font-weight:700; }
    .pill-win    { background:#e8f5e9;color:#2e7d32; }
    .pill-draw   { background:#fff8e1;color:#e65100; }
    .pill-goal   { background:#e3f2fd;color:#0d47a1; }
    .total-block { text-align:right; }
    .total-pts   { font-size:1.7rem;font-weight:900;color:var(--navy);line-height:1; }
    .total-label { font-size:.62rem;color:var(--text-mute);font-weight:600;text-transform:uppercase;letter-spacing:.5px; }

    /* ── MATCH LIST (Partidos) ────────────────────────── */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      font-size: .72rem; font-weight: 800; color: var(--text-mute);
      text-transform: uppercase; letter-spacing: 1.5px;
      margin: 1.2rem 0 .6rem;
    }
    .section-label::before, .section-label::after {
      content:''; flex:1; height:1px; background:var(--border);
    }
    .section-label.live-label { color: var(--live-red); }

    .match-item {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--white);
      margin-bottom: 7px;
      transition: border-color .15s, box-shadow .15s;
    }
    .match-item:hover { border-color: var(--gold-dk); box-shadow: var(--shadow-sm); }
    .match-item.is-live { border-color: var(--live-red); background: #fff8f8; }
    .match-item.no-quiniela { opacity: .5; }

    .match-team-a { text-align: right; }
    .match-team-b { text-align: left; }
    .match-tname { font-weight: 700; font-size: .88rem; }
    .match-owner { font-size: .68rem; color: var(--text-mute); margin-top: 2px; }

    .match-center { display:flex;flex-direction:column;align-items:center;gap:3px; }
    .score-badge {
      padding: 5px 12px;
      border-radius: var(--radius-xs);
      font-weight: 900; font-size: 1rem;
      letter-spacing: 3px; white-space: nowrap;
      min-width: 60px; text-align: center;
    }
    .score-badge.win-a  { background:#1b5e20;color:#fff; }
    .score-badge.win-b  { background:#b71c1c;color:#fff; }
    .score-badge.draw   { background:#e65100;color:#fff; }
    .score-badge.live   { background:var(--live-red);color:#fff; animation: live-pulse 2s ease-in-out infinite; }
    .score-badge.sched  { background:var(--bg);color:var(--text-mid);font-size:.8rem;letter-spacing:0; }
    @keyframes live-pulse {
      0%,100% { box-shadow: none; }
      50% { box-shadow: 0 0 10px rgba(211,47,47,.5); }
    }
    .match-phase { font-size:.6rem;color:var(--text-mute);font-weight:700;text-transform:uppercase;letter-spacing:.5px; }
    .live-badge {
      display: inline-block;
      background: var(--live-red); color:#fff;
      font-size:.58rem; font-weight:800;
      padding:2px 6px; border-radius:10px; letter-spacing:.5px;
    }
    .espn-badge {
      display:inline-block;
      background:#e3f2fd;color:#0d47a1;
      font-size:.58rem;font-weight:800;
      padding:1px 5px;border-radius:8px;letter-spacing:.3px;
      margin-left:3px;
    }

    /* ── TEAM CARDS ──────────────────────────────────── */
    .teams-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:1rem; }
    .player-card { border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow); }
    .player-card-head { padding:13px 16px;display:flex;align-items:center;justify-content:space-between; }
    .player-card-name { color:var(--white);font-weight:900;font-size:1.15rem; }
    .player-card-pts  { background:rgba(255,255,255,.2);color:var(--white);padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700; }
    .player-card-body { background:var(--white);padding:12px 16px; }
    .team-chip {
      display:inline-flex;align-items:center;gap:5px;
      padding:3px 10px;border-radius:20px;
      font-size:.74rem;font-weight:600;
      margin:3px; white-space:nowrap;
    }

    /* ── EMPTY / TOAST ───────────────────────────────── */
    .empty-state { text-align:center;padding:3rem 1rem;color:var(--text-mute); }
    .empty-state .e-icon { font-size:3rem;margin-bottom:12px; }

    .toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(100px);
      background:var(--navy); color:var(--white);
      padding:10px 24px; border-radius:30px;
      font-weight:700; font-size:.86rem;
      z-index:999; pointer-events:none;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1);
      box-shadow:var(--shadow-lg);
    }
    .toast.show { transform:translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width:520px) {
      .live-match, .upcoming-match { grid-template-columns:1fr auto 1fr; }
      .live-score { font-size:1.1rem; padding:5px 10px; letter-spacing:2px; }
      .teams-grid { grid-template-columns:1fr; }
      .match-item { gap:6px; padding:9px 10px; }
      .match-tname { font-size:.8rem; }
      .score-badge { font-size:.88rem; min-width:50px; padding:4px 8px; }
      .total-pts { font-size:1.4rem; }
      .standing-row { gap:8px; padding:10px; }
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════════════════ -->
<header class="header">
  <div class="header-eyebrow">USA · CANADA · MEXICO</div>
  <h1>QUINIELA <em>MUNDIAL 2026</em></h1>
  <p class="header-sub">La Gran Batalla</p>
  <div class="scoring-row">
    <span class="score-tag">🏅 Victoria · 3 pts</span>
    <span class="score-tag">🤝 Empate · 1 pt</span>
    <span class="score-tag">⚽ Gol · 0.5 pts</span>
  </div>
</header>

<!-- ══ NAV ═════════════════════════════════════════════════════════════ -->
<div class="nav-wrap">
  <div class="nav-inner">
    <nav class="nav">
      <button class="nav-btn active" onclick="showTab('posiciones',this)">
        <span>🏆</span><span class="nav-label">Posiciones</span>
      </button>
      <button class="nav-btn" onclick="showTab('partidos',this)">
        <span>⚽</span><span class="nav-label">Partidos</span>
      </button>
      <button class="nav-btn" onclick="showTab('equipos',this)">
        <span>👥</span><span class="nav-label">Equipos</span>
      </button>
    </nav>
    <div class="sync-pill" id="sync-pill">
      <span class="sync-dot pulse" id="sync-dot"></span>
      <span class="sync-label" id="sync-label">Cargando…</span>
    </div>
  </div>
</div>

<!-- ══ MAIN ════════════════════════════════════════════════════════════ -->
<main class="container">

  <!-- ── POSICIONES ─────────────────────────────────────────────────── -->
  <div id="tab-posiciones" class="tab-panel active">
    <div id="live-section"></div>
    <div class="card">
      <div class="card-title">🏆 Tabla de Posiciones</div>
      <div class="standings-list" id="standings-list"></div>
    </div>
  </div>

  <!-- ── PARTIDOS ───────────────────────────────────────────────────── -->
  <div id="tab-partidos" class="tab-panel">
    <div id="match-list"></div>
  </div>

  <!-- ── EQUIPOS ────────────────────────────────────────────────────── -->
  <div id="tab-equipos" class="tab-panel">
    <div class="teams-grid" id="teams-grid"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<!-- ══ SCRIPT ══════════════════════════════════════════════════════════ -->

const RANK_MEDALS = ['🥇','🥈','🥉'];

const TEAM_OWNER = {};
Object.entries(PLAYERS).forEach(([n,d]) => d.teams.forEach(t => TEAM_OWNER[t] = n));

/* ── NAME MAP: ESPN → quiniela ─────────────────────────────────────── */
const NAME_MAP = {
  'Netherlands':'Países Bajos','Holland':'Países Bajos',
  'Iran':'Irán','Croatia':'Croacia','Saudi Arabia':'Arabia Saudita',
  'New Zealand':'Nueva Zelanda','Iraq':'Irak','Canada':'Canadá',

  'Egypt':'Egipto','Qatar':'Catar','Sweden':'Suecia','France':'Francia',
  'Brazil':'Brasil','Brasil':'Brasil',
  'Curaçao':'Curazao','DR Congo':'Congo','Congo DR':'Congo','Congo, DR':'Congo',
  'Bosnia-Herzegovina':'Boshit de Segoviano',
  'Bosnia and Herzegovina':'Boshit de Segoviano',
};
const normName = n => NAME_MAP[n] || n;

/* ── STORAGE ───────────────────────────────────────────────────────── */
const getMatches = () => JSON.parse(localStorage.getItem('q2026_matches') || '[]');
const saveMatches = m => localStorage.setItem('q2026_matches', JSON.stringify(m));

/* ── SCORING ───────────────────────────────────────────────────────── */
function calcStandings() {
  const matches = getMatches().filter(m => m.goalsA !== null && m.goalsB !== null);
  return Object.entries(PLAYERS).map(([name, d]) => {
    let winPts = 0, drawPts = 0, goalPts = 0;
    d.teams.forEach(team => {
      matches.forEach(m => {
        const isA = m.teamA === team, isB = m.teamB === team;
        if (!isA && !isB) return;
        const mine   = isA ? m.goalsA : m.goalsB;
        const theirs = isA ? m.goalsB : m.goalsA;
        goalPts += mine * .5;
        if (mine > theirs)      winPts  += 3;
        else if (mine === theirs) drawPts += 1;
      });
    });
    return { name, winPts, drawPts, goalPts,
             total: +(winPts+drawPts+goalPts).toFixed(1),
             color: d.color, light: d.light };
  }).sort((a,b) => b.total - a.total || a.name.localeCompare(b.name));
}

/* ── ESPN ──────────────────────────────────────────────────────────── */
let _espnEvents = [];
let _syncTimer  = null;

const WC_START = '20260611';
const WC_END   = (() => {
  const d = new Date(); d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0,10).replace(/-/g,'');
})();

const ESPN_URLS = [
  `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${WC_START}-${WC_END}&limit=200`,
  `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.wc/scoreboard?dates=${WC_START}-${WC_END}&limit=200`,
];

function setSyncPill(state, txt) {
  const pill = document.getElementById('sync-pill');
  const dot  = document.getElementById('sync-dot');
  const lbl  = document.getElementById('sync-label');
  pill.className = 'sync-pill ' + state;
  dot.className  = 'sync-dot' + (state === 'spin' ? ' pulse' : '');
  lbl.textContent = txt;
}

async function fetchLiveData() {
  setSyncPill('spin', 'Actualizando…');
  let found = false;

  for (const url of ESPN_URLS) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      const evs  = data.events || [];
      if (!evs.length) continue;
      _espnEvents = evs;
      mergeESPN(evs);
      found = true;
      break;
    } catch (_) { continue; }
  }

  if (!found) {
    setSyncPill('err', 'Sin conexión');
  } else {
    const t = new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    const live = _espnEvents.filter(isLive).length;
    setSyncPill('ok', live ? `🔴 ${live} en vivo · ${t}` : `✅ ${t}`);
  }

  renderAll();
}

function mergeESPN(events) {
  const matches = getMatches();
  events.forEach(ev => {
    const comp = ev.competitions?.[0];
    if (!comp) return;
    const completed  = comp.status?.type?.completed;
    const inProgress = isLive({ competitions: [comp] });
    if (!completed && !inProgress) return;

    const home = comp.competitors?.find(c => c.homeAway === 'home');
    const away = comp.competitors?.find(c => c.homeAway === 'away');
    if (!home || !away) return;

    const teamA  = normName(home.team?.displayName || home.team?.name || '');
    const teamB  = normName(away.team?.displayName || away.team?.name || '');
    const goalsA = home.score != null ? parseInt(home.score, 10) : null;
    const goalsB = away.score != null ? parseInt(away.score, 10) : null;
    const date   = (ev.date || '').slice(0, 10);
    const phase  = comp.status?.type?.description || 'Fase de Grupos';
    const apiId  = String(ev.id || comp.id);

    if (!TEAM_OWNER[teamA] && !TEAM_OWNER[teamB]) return;

    const existing = matches.find(m =>
      m.apiId === apiId || (m.teamA === teamA && m.teamB === teamB && m.date === date)
    );
    if (existing) {
      existing.goalsA = goalsA; existing.goalsB = goalsB; existing.apiId = apiId;
    } else {
      matches.push({ teamA, teamB, goalsA, goalsB, phase, date,
                     id: Date.now() + Math.random(), apiId, auto: true });
    }
  });
  saveMatches(matches);
}

/* ── EVENT HELPERS ─────────────────────────────────────────────────── */
const LIVE_STATUSES = new Set([
  'STATUS_IN_PROGRESS','STATUS_FIRST_HALF','STATUS_SECOND_HALF',
  'STATUS_HALFTIME','STATUS_EXTRA_TIME','STATUS_FIRST_EXTRA_TIME',
  'STATUS_SECOND_EXTRA_TIME','STATUS_PENALTY','STATUS_OVERTIME',
]);
function isLive(ev) {
  const n = ev.competitions?.[0]?.status?.type?.name || '';
  return LIVE_STATUSES.has(n) || (!ev.competitions?.[0]?.status?.type?.completed && n.includes('HALF'));
}
function isFinished(ev) {
  return !!ev.competitions?.[0]?.status?.type?.completed;
}
function isScheduled(ev) {
  return !isLive(ev) && !isFinished(ev);
}
function getClock(ev) {
  const comp = ev.competitions?.[0];
  const n    = comp?.status?.type?.name || '';
  if (n.includes('HALFTIME')) return 'Medio Tiempo';
  const clock = comp?.status?.displayClock || '';
  const period = comp?.status?.period || 1;
  return clock ? `${clock} · ${period === 1 ? '1T' : period === 2 ? '2T' : 'ET'}` : 'En Vivo';
}
function getComp(ev) { return ev.competitions?.[0]; }
function getHome(ev) { return getComp(ev)?.competitors?.find(c => c.homeAway === 'home'); }
function getAway(ev) { return getComp(ev)?.competitors?.find(c => c.homeAway === 'away'); }
function teamName(comp) { return normName(comp?.team?.displayName || comp?.team?.name || ''); }
function flag(t)   { return FLAGS[t] || '🏳'; }
function owner(t)  { return TEAM_OWNER[t] || null; }
function ownerColor(t) { const o = owner(t); return o ? PLAYERS[o]?.color : '#888'; }

function evDate(ev) {
  const raw = ev.date || ev.competitions?.[0]?.date || '';
  return raw.slice(0, 10);
}
function evTime(ev) {
  const raw = ev.date || ev.competitions?.[0]?.date || '';
  if (!raw) return '';
  try {
    return new Date(raw).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  } catch { return ''; }
}

/* ── RENDER: LIVE SECTION ──────────────────────────────────────────── */
function renderLiveSection() {
  const el = document.getElementById('live-section');
  const lives = _espnEvents.filter(isLive);
  const todayStr = new Date().toISOString().slice(0,10);
  const upcoming = _espnEvents.filter(isScheduled).filter(ev => evDate(ev) === todayStr).slice(0,4);

  if (!lives.length && !upcoming.length) { el.innerHTML = ''; return; }

  const liveHTML = lives.map(ev => {
    const h = getHome(ev), a = getAway(ev);
    const tA = teamName(h), tB = teamName(a);
    const oA = owner(tA), oB = owner(tB);
    const pA = oA ? PLAYERS[oA] : null, pB = oB ? PLAYERS[oB] : null;
    return `
      <div class="live-match">
        <div class="live-team">
          <div class="live-flag">${flag(tA)}</div>
          <div class="live-team-name">${tA}</div>
          ${pA ? `<span class="live-owner" style="background:${pA.light};color:${pA.color}">${oA}</span>` : ''}
        </div>
        <div class="live-score-block">
          <div class="live-score">${h?.score ?? 0} &nbsp;—&nbsp; ${a?.score ?? 0}</div>
          <div class="live-clock"><span class="live-dot-big" style="width:7px;height:7px"></span>${getClock(ev)}</div>
        </div>
        <div class="live-team right">
          <div class="live-flag">${flag(tB)}</div>
          <div class="live-team-name">${tB}</div>
          ${pB ? `<span class="live-owner" style="background:${pB.light};color:${pB.color}">${oB}</span>` : ''}
        </div>
      </div>`;
  }).join('');

  const upHTML = upcoming.length ? `
    <div style="${lives.length ? 'margin-top:.8rem;padding-top:.8rem;border-top:1px dashed #fde8e8' : ''}">
      ${lives.length ? '<div style="font-size:.65rem;font-weight:700;color:var(--text-mute);text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem">Próximos hoy</div>' : ''}
      ${upcoming.map(ev => {
        const h = getHome(ev), a = getAway(ev);
        const tA = teamName(h), tB = teamName(a);
        return `
          <div class="upcoming-match">
            <div style="text-align:right;font-size:.85rem;font-weight:600">${flag(tA)} ${tA}</div>
            <div>
              <div class="upcoming-score">${evTime(ev)}</div>
            </div>
            <div style="font-size:.85rem;font-weight:600">${tB} ${flag(tB)}</div>
          </div>`;
      }).join('')}
    </div>` : '';

  const cardClass = lives.length ? 'card live-card' : 'card';
  const titleHTML = lives.length
    ? `<div class="live-title"><span class="live-dot-big"></span>EN VIVO · ${lives.length} partido${lives.length>1?'s':''}</div>`
    : `<div class="card-title">📅 Próximos hoy</div>`;
  el.innerHTML = `<div class="${cardClass}">${titleHTML}${liveHTML}${upHTML}</div>`;
}

/* ── RENDER: STANDINGS ─────────────────────────────────────────────── */
function renderStandings() {
  const rows = calcStandings();
  document.getElementById('standings-list').innerHTML = rows.map((r, i) => {
    const medal = RANK_MEDALS[i];
    const cls   = i < 3 ? `rank-${i+1}` : '';
    const rankEl = medal
      ? `<div class="rank-badge">${medal}</div>`
      : `<div class="rank-num">${i+1}</div>`;
    return `
      <div class="standing-row ${cls}">
        ${rankEl}
        <div>
          <div class="player-name" style="color:${r.color}">${r.name}</div>
          <div class="pts-pills">
            <span class="pill pill-win">🏅 ${r.winPts.toFixed(1)}</span>
            <span class="pill pill-draw">🤝 ${r.drawPts.toFixed(1)}</span>
            <span class="pill pill-goal">⚽ ${r.goalPts.toFixed(1)}</span>
          </div>
        </div>
        <div class="total-block">
          <div class="total-pts">${r.total}</div>
          <div class="total-label">pts</div>
        </div>
      </div>`;
  }).join('');
}

/* ── RENDER: MATCH LIST ────────────────────────────────────────────── */
function renderMatchList() {
  const el = document.getElementById('match-list');

  // Build display list from ESPN events (all statuses)
  const allEvs = [..._espnEvents].sort((a,b) => new Date(b.date) - new Date(a.date));
  const stored  = getMatches();

  const lives     = allEvs.filter(isLive);
  const finished  = allEvs.filter(isFinished);
  const scheduled = allEvs.filter(isScheduled);

  if (!allEvs.length && !stored.length) {
    el.innerHTML = `<div class="empty-state"><div class="e-icon">⚽</div><p>Esperando resultados del Mundial…</p></div>`;
    return;
  }

  function matchCard(ev, statusClass) {
    const h  = getHome(ev), a = getAway(ev);
    const tA = teamName(h), tB = teamName(a);
    const oA = owner(tA),   oB = owner(tB);
    const live = isLive(ev);
    const fin  = isFinished(ev);
    const comp = getComp(ev);
    const phase = comp?.status?.type?.description || '';

    const hScore = h?.score ?? '';
    const aScore = a?.score ?? '';

    let badgeClass = 'sched', scoreText = evTime(ev) || '- : -';
    if (live) { badgeClass = 'live'; scoreText = `${hScore} — ${aScore}`; }
    else if (fin) {
      scoreText = `${hScore} — ${aScore}`;
      if   (hScore > aScore) badgeClass = 'win-a';
      else if (aScore > hScore) badgeClass = 'win-b';
      else badgeClass = 'draw';
    }

    const noQ = !oA && !oB;
    return `
      <div class="match-item ${live?'is-live':''} ${noQ?'no-quiniela':''}">
        <div class="match-team-a">
          <div class="match-tname">${flag(tA)} ${tA}</div>
          ${oA ? `<div class="match-owner" style="color:${PLAYERS[oA].color}">${oA}</div>` : ''}
        </div>
        <div class="match-center">
          <div class="score-badge ${badgeClass}">${scoreText}</div>
          <div class="match-phase">${live ? `<span class="live-badge">🔴 EN VIVO</span>` : phase}</div>
        </div>
        <div class="match-team-b">
          <div class="match-tname">${tB} ${flag(tB)}</div>
          ${oB ? `<div class="match-owner" style="color:${PLAYERS[oB].color}">${oB}</div>` : ''}
        </div>
      </div>`;
  }

  let html = '';

  if (lives.length) {
    html += `<div class="section-label live-label">🔴 En Vivo</div>`;
    html += lives.map(ev => matchCard(ev)).join('');
  }
  if (scheduled.length) {
    html += `<div class="section-label">📅 Próximos</div>`;
    html += scheduled.map(ev => matchCard(ev)).join('');
  }
  if (finished.length) {
    html += `<div class="section-label">✅ Terminados</div>`;
    html += finished.map(ev => matchCard(ev)).join('');
  }

  // Fallback: show stored matches if no ESPN data
  if (!allEvs.length && stored.length) {
    html += `<div class="section-label">✅ Terminados</div>`;
    html += stored.map(m => {
      const oA = owner(m.teamA), oB = owner(m.teamB);
      let bc = m.goalsA > m.goalsB ? 'win-a' : m.goalsA < m.goalsB ? 'win-b' : 'draw';
      return `
        <div class="match-item">
          <div class="match-team-a">
            <div class="match-tname">${flag(m.teamA)} ${m.teamA}</div>
            ${oA ? `<div class="match-owner" style="color:${PLAYERS[oA].color}">${oA}</div>` : ''}
          </div>
          <div class="match-center">
            <div class="score-badge ${bc}">${m.goalsA} — ${m.goalsB}</div>
            <div class="match-phase">${m.phase||''}</div>
          </div>
          <div class="match-team-b">
            <div class="match-tname">${m.teamB} ${flag(m.teamB)}</div>
            ${oB ? `<div class="match-owner" style="color:${PLAYERS[oB].color}">${oB}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  el.innerHTML = html;
}

/* ── RENDER: TEAMS ─────────────────────────────────────────────────── */
function renderTeams() {
  const standings = calcStandings();
  document.getElementById('teams-grid').innerHTML = Object.entries(PLAYERS).map(([name, d]) => {
    const s = standings.find(x => x.name === name);
    const chips = d.teams.map(t =>
      `<span class="team-chip" style="background:${d.light};color:${d.color}">${FLAGS[t]||''} ${t}</span>`
    ).join('');
    return `
      <div class="player-card">
        <div class="player-card-head" style="background:${d.color}">
          <div class="player-card-name">${name}</div>
          <div class="player-card-pts">${s?.total ?? 0} pts</div>
        </div>
        <div class="player-card-body">${chips}</div>
      </div>`;
  }).join('');
}

/* ── TABS ──────────────────────────────────────────────────────────── */
function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if (btn) btn.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── TOAST ─────────────────────────────────────────────────────────── */
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ── BOOT ──────────────────────────────────────────────────────────── */
function renderAll() {
  renderLiveSection();
  renderStandings();
  renderMatchList();
  renderTeams();
}

// Migrate old "Brazil" → "Brasil" in stored matches
(() => {
  const m = getMatches();
  let changed = false;
  m.forEach(x => {
    if (x.teamA === 'Brazil') { x.teamA = 'Brasil'; changed = true; }
    if (x.teamB === 'Brazil') { x.teamB = 'Brasil'; changed = true; }
  });
  if (changed) saveMatches(m);
})();

// Initial render with cached data
renderAll();

// Fetch live data immediately, then every 60s
fetchLiveData();
setInterval(fetchLiveData, 60000);
</script>
